<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медиа центр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }
        
        .tab-btn:hover {
            background: #e9ecef;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: white;
        }
        
        .tab-content {
            display: none;
            padding: 20px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .items-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .item {
            padding: 8px;
            margin: 4px 0;
            background: #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 2px solid transparent;
        }
        
        .item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-left-color: #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .item.selected .item-icon {
            color: white;
        }
        
        .item-icon {
            display: inline-block;
            margin-right: 12px;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .item-name {
            display: inline-block;
            font-size: 1.1em;
        }
        
        .item-type {
            float: right;
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(0,0,0,0.1);
        }
        
        .item.selected .item-type {
            background: rgba(255,255,255,0.2);
        }
        
        .launch-btn {
            width: 100%;
            margin-top: 10px;
            padding: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .launch-btn:active {
            transform: translateY(0);
        }
        
        .launch-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 5px;
            padding: 2px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .stats {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            color: #6c757d;
            font-size: 0.9em;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .launching {
            animation: pulse 0.5s ease-in-out;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
          <!--  <h1>Медиа центр</h1>         -->
            <h2>Медиа центр</h2>         
          <!--   <p>Радио каналы и файлы</p> -->
        </div>

        <div class="content" style="padding: 0 10px 10px 10px;">
            <button class="launch-btn" id="launchBtn">🚀 Запустить выбранное</button>
            <div id="message" class="message"></div>
        </div>


        <div class="tabs">
            <button class="tab-btn active" data-tab="m3u">☕ Радио Каналы</button>
          <!--   <button class="tab-btn" data-tab="files">📁 Файлы</button> -->
        </div>
        
        <div id="files-tab" class="tab-content">
            <div class="search-box">
                <input type="text" id="searchFiles" placeholder="🔍 Поиск файлов..." autocomplete="off">
            </div>
            <ul class="items-list" id="filesList"></ul>
        </div>
        
        <div id="m3u-tab" class="tab-content active">
            <div class="search-box">
                <input type="text" id="searchM3u" placeholder="🔍 Поиск каналов..." autocomplete="off">
            </div>
            <ul class="items-list" id="m3uList"></ul>
        </div>
        
        <div class="content" style="padding: 0 20px 20px 20px;">
            <div class="stats">
                <span id="statsText"></span>
            </div>
        </div>

    </div>
    
    <script>
        let items = {{ items | tojson | safe }};
        let selectedItem = null;
        let currentTab = 'm3u'; // ТВ каналы по умолчанию
        
        const launchBtn = document.getElementById('launchBtn');
        const messageDiv = document.getElementById('message');
        
        function showMessage(text, isError = false) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${isError ? 'error' : 'success'}`;
            //setTimeout(() => {
            //    messageDiv.className = 'message';
            //}, 3000);
        }
        
        function getIcon(item) {
            if (item.type === 'm3u') return '☕';
            if (item.name.endsWith('.py')) return '🐍';
            if (item.name.endsWith('.sh')) return '📜';
            if (item.name.endsWith('.txt')) return '📄';
            if (item.name.match(/\.(jpg|png|gif|jpeg)$/i)) return '🖼️';
            if (item.name.match(/\.(mp3|wav|flac|ogg)$/i)) return '🎵';
            if (item.name.match(/\.(mp4|avi|mkv|mov)$/i)) return '🎬';
            return '📎';
        }
        
        function renderList(itemsList, containerId, searchInputId) {
            const container = document.getElementById(containerId);
            const searchInput = document.getElementById(searchInputId);
            
            function filterAndRender() {
                const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
                const filtered = itemsList.filter(item => 
                    item.name.toLowerCase().includes(searchTerm)
                );
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 Ничего не найдено</div>';
                    updateStats();
                    return;
                }
                
                container.innerHTML = filtered.map(item => `
                    <li class="item" data-name="${escapeHtml(item.name)}" data-type="${item.type}">
                        <span class="item-icon">${getIcon(item)}</span>
                        <span class="item-name">${escapeHtml(item.name)}</span>
                        <span class="item-type">${item.type === 'm3u' ? 'Радио канал' : 'Файл'}</span>
                    </li>
                `).join('');
                
                attachItemListeners(container);
                updateStats();
            }
            
            if (searchInput) {
                searchInput.addEventListener('input', filterAndRender);
            }
            
            filterAndRender();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function attachItemListeners(container) {
            const items = container.querySelectorAll('.item');
            items.forEach(item => {
                item.removeEventListener('click', handleItemClick);
                item.addEventListener('click', handleItemClick);
            });
        }
        
        function handleItemClick(event) {
            const item = event.currentTarget;
            const name = item.dataset.name;
            const type = item.dataset.type;
            
            // Убираем выделение со всех элементов в текущей вкладке
            document.querySelectorAll(`#${currentTab}-tab .item`).forEach(i => {
                i.classList.remove('selected');
            });
            
            item.classList.add('selected');
            selectedItem = { name, type };
            console.log(`Выбрано: ${name} (${type})`);
        }
        
        async function launchSelected() {
            if (!selectedItem) {
                showMessage('❌ Пожалуйста, выберите элемент для запуска', true);
                return;
            }
            
            launchBtn.disabled = true;
            launchBtn.classList.add('launching');
            launchBtn.textContent = '⏳ Запуск...';
            
            try {
                const response = await fetch('/launch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(selectedItem)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ ${data.message}`);
                } else {
                    showMessage(`❌ Ошибка: ${data.error}`, true);
                }
            } catch (error) {
                showMessage(`❌ Ошибка соединения: ${error.message}`, true);
            } finally {
                launchBtn.disabled = false;
                launchBtn.classList.remove('launching');
                launchBtn.textContent = '🚀 Запустить выбранное';
            }
        }
        
        function updateStats() {
            const filesCount = items.filter(i => i.type === 'file').length;
            const m3uCount = items.filter(i => i.type === 'm3u').length;
            const statsText = document.getElementById('statsText');
            if (statsText) {
                statsText.textContent = `📁 Файлов: ${filesCount} | ☕ Каналов: ${m3uCount}`;
            }
        }
        
        function switchTab(tabId) {
            currentTab = tabId;
            
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            // Показываем выбранную
            document.getElementById(`${tabId}-tab`).classList.add('active');
            
            // Обновляем активную кнопку
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
            
            // Сбрасываем выбранный элемент
            // Убираем выделение со всех элементов в текущей вкладке
            document.querySelectorAll(`#${tabId}-tab .item`).forEach(i => {
                i.classList.remove('selected');
            });
            selectedItem = null;
        }
        
        // Инициализация
        const files = items.filter(i => i.type === 'file');
        const m3uItems = items.filter(i => i.type === 'm3u');

	// find() возвращает первый найденный элемент (не массив)
	const cur_station = items.find(i => i.type === 'cur_station');
        const cur_volume = items.find(i => i.type === 'cur_volume');

	// Обращение к position напрямую
	if (cur_station) {
	    const position = cur_station.position;
	    console.log(position);
	    console.log(m3uItems[position-1].name);
	    showMessage(m3uItems[position-1].name);
	}
	if (cur_volume) {
	    const volume = cur_volume.volume;
	    console.log(volume);
	}

        renderList(files, 'filesList', 'searchFiles');
        renderList(m3uItems, 'm3uList', 'searchM3u');
        
        // Обработчики переключения вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        
        // Обработчик кнопки запуска
        launchBtn.addEventListener('click', launchSelected);
        
        console.log('Медиа центр загружен. Активная вкладка: ТВ каналы');
    </script>
</body>
</html>
